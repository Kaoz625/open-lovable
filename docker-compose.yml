services:
  open-lovable:
    build:
      context: .
      network: host
    ports:
      - "3000:3000"
    env_file: .env
    depends_on:
      crawl4ai-service:
        condition: service_healthy

  crawl4ai-service:
    build:
      context: ./crawl4ai-service
      network: host
    ports:
      - "8000:8000"
    env_file: .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
